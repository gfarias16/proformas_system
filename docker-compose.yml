services:
  db:
    image: postgres:17-alpine
    container_name: proformas_db
    environment:
      POSTGRES_DB: proformas
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d proformas"]
      interval: 5s
      timeout: 5s
      retries: 20

  api:
    build:
      context: .
      dockerfile: docker/api.Dockerfile
    container_name: proformas_api
    environment:
      DATABASE_URL: postgresql+psycopg2://postgres:postgres@db:5432/proformas
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"

  frontend:
    build:
      context: .
      dockerfile: docker/frontend.Dockerfile
    container_name: proformas_frontend
    environment:
      VITE_API_PROXY_TARGET: http://api:8000
    depends_on:
      - api
    ports:
      - "5173:5173"

volumes:
  postgres_data:
